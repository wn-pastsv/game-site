<p><h3>エピソード5/12</h3></p>
目的の場所に向かいます。<br>
ところどころがけ崩れが発生していて、道路が寸断されています。<br>
何故、災害対策をしてないのだろうか…<br>
下を向き、足元に注意しながら進みます。<br>
<br>
目的の場所に着きました。<br>
木の根元には洞穴があります。<br>

死を覚悟しましたが、どうやら狼たちは目の前に居る私に気づいていないようです。<br>
まるで、私の存在が全く見えていないかのようです。<br>
洞穴の奥には、カバンが置いてあります。洞穴の中には他に気になるものはありません。<br>
